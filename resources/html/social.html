<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social | NCBA.Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/chat.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="manifest" href="/site.webmanifest">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../javascript/localhost.js"></script>
    <script src="../javascript/index.js"></script>
    <script src="../javascript/ui-util.js"></script>
    <script src="../javascript/social.js"></script>
    <script src="../javascript/darkmode.js"></script>
    <script>
        window.checkAuth();
    </script>
    <style>
        /* Specific adjustments for the social layout to match wireframe exactly */
        .profile-section.bento-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
            gap: 10px;
            min-height: 0;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--accent-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            background: var(--card-bg);
        }
        .dept-nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }
        .dept-link {
            padding: 12px 20px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            text-align: left;
            letter-spacing: 2px;
            transition: all 0.2s ease;
        }
        .dept-link:hover {
            transform: translateX(5px);
            background: var(--text-main);
            color: var(--inverted-text-color);
        }

        .announce-area {
            height: 30vh;
        }
        
        /* Re-styling Featured and Recently for Sidebar */
        .sidebar-featured {
            min-height: 200px !important;
            padding: 0;
            overflow: hidden;
        }

        /* Fix for the sidebar-specific sliders */
        .sidebar-featured, .sidebar-recently {
            position: relative;
            overflow: hidden; 
            padding: 0 !important; 
            min-height: 200px !important;
            height: 25vh; /* Force a height so the track doesn't collapse */
        }

        .sidebar-featured .slider-track, .sidebar-recently .slider-track {
            display: flex;
            height: 100%;
            width: 100%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .sidebar-featured .hero-slide, .sidebar-recently .hero-slide {
            min-width: 100%;
            height: 100%;   
            position: relative;
            flex-shrink: 0;
        }

        /* Ensure the image is visible above the card background */
        .sidebar-featured .hero-bg, .sidebar-recently .events-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .sidebar-featured .hero-content, .sidebar-recently .hero-content {
            z-index: 2; 
        }
        
        /* Ensure the feed is scrollable but doesn't break the layout */
        .main-feed {
            max-height: calc(100vh - 120px);
            margin: 0 auto;
            overflow-y: auto;
            padding-right: 10px;
            scrollbar-width: none;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .main-feed::-webkit-scrollbar {
            display: none;
        }
        
        /* Ensure social cards grow with content and don't have a fixed min-height that causes overlap */
        .main-feed .bento-card {
            min-height: unset;
            height: auto;
            flex-shrink: 0;
        }

        body {overflow: hidden};

        nav {
            justify-content: center !important;
            gap: 20px;
        }

    </style>
</head>
<body>
    <div class="noise-bg"></div>
    <div id="toast-container" style="position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000;"></div>

    <nav>
        <div class="logo">NCBA.LIFE</div>
        <div style="font-weight: 600; font-size: 0.9rem;">
            Social Feed <span style="opacity: 0.5">/ 2026</span>
        </div>
        <button id="theme-toggle" class="theme-btn" aria-label="Toggle dark mode">
            <span class="icon-sun">☀️</span>
            <span class="icon-moon">🌙</span>
        </button>
    </nav>
        <div class="contact">Cubao Campus 8913-8785 loc. 161-163 . Taytay Campus 8286-2928 / 8658-6992 . Fairview Campus: 8442-6956, 8442-6947</div>


    <div class="feed-wrapper">
        <!-- LEFT SIDEBAR: User Profile & Departments -->
        <aside class="left-sidebar">
            <div class="bento-card profile-section">
                <div class="profile-avatar" id="user-initial">U</div>
                <div style="font-weight: 800; font-size: 1.1rem;" id="user-firstname">User</div>
            </div>

            <div class="dept-nav">
                <a href="department.html?dept=ANNOUNCEMENT" class="dept-link">ANNOUNCEMENT</a>
                <a href="department.html?dept=ISSOC" class="dept-link">ISSOC</a>
                <a href="department.html?dept=JPIA" class="dept-link">JPIA</a>
                <a href="department.html?dept=HM" class="dept-link">HM</a>
                <a href="department.html?dept=BSBA" class="dept-link">BSBA</a>
                <a href="department.html?dept=SABELA" class="dept-link">SABELA</a>
            </div>

            <!-- Recently (Events Style) -->
            <div class="bento-card events-area sidebar-recently" id="recently-container">
                
            </div>
        </aside>

        <!-- CENTER: Social Feed -->
        <div class="main-feed" id="social-feed-container">
            <div class="bento-card" style="padding: 40px; text-align: center; color: var(--text-muted);">
                <p>Loading your feed...</p>
            </div>
        </div>

        <!-- RIGHT SIDEBAR: Featured, Recently, Announcements -->
        <aside class="right-sidebar">
            <!-- Featured (Hero Style) -->
            <div class="bento-card hero-card sidebar-featured" id="main-hero-area">
                <p style="padding: 20px; font-size: 0.8rem; color: var(--text-muted); max-height: 3vh !important;">Loading featured...</p>
            </div>

            <!-- Announcement Board -->
            <div class="bento-card announce-area" style="min-height: 400px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="margin:0; font-size: 1rem;">Announcement Board</h2>
                    <div class="live-indicator"></div>
                </div>
                
                <div style="position: relative; flex: 1; min-height: 0;">
                    <div id="announcements-container" style="position: absolute; top: 0; bottom: 0; left: 0; right: 0; overflow-y:auto; padding-right: 5px">
                        <p style="color: #999; font-size: 0.8rem;">Loading notices...</p>  
                    </div>
                </div>
            </div>

        </aside>
    </div>
    <div class="post-container" aria-label="Create Post">
        <span class="post-button" onclick="window.createPostOverlay()"><strong>+</strong></span>
        <span class="chat-button" onclick="window.openChat(event)">
            <svg width="25" height="25" viewBox="0 0 25 25">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
            </svg>
        </span>
    </div>
</body>
</html>
