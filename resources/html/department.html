<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCBA.Life | Department</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css-modular/main.css">
    <link rel="stylesheet" href="../css-modular/pages/social.css">
    <link rel="stylesheet" href="../css/department.css">
</head>

<body>
    <div id="toast-container"
        style="position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000;">
    </div>

    <nav>
        <div class="logo">NCBA.LIFE</div>
        <div style="font-weight: 600; font-size: 0.9rem;">
            <a href="../html/social-v2.html" style="text-decoration: none; color: inherit;">← Back to Social</a>
        </div>
        <button id="theme-toggle" class="theme-btn" aria-label="Toggle dark mode">
            <span class="icon-sun">☀️</span>
            <span class="icon-moon">🌙</span>
        </button>
    </nav>

    <main style="grid-template-areas: none; display: grid;">
        <header class="dept-header bento-card" id="dept-header">
            <div class="dept-header-content">
                <span class="dept-badge" id="dept-badge">Department</span>
                <span class="dept-badge dept-link" id="dept-link">Facebook</span>
                <h1 id="dept-name">Department Name</h1>
                <p class="dept-intro" id="dept-intro">Loading introduction...</p>
            </div>
        </header>

        <section class="posts-grid" id="posts-grid">
            <h2>Loading...</h2>
            <!-- Posts will be loaded here -->
        </section>
    </main>


    <footer>
        <p class="tag" style="background-color: #98ffb3 !important; color: black">Computer Programming 2 • Group 1</p>
        <p class="tag" style="background-color: black; color: #98ffb3">NCBA.LIFE © 2026 • All rights reserved.</p>
    <footer>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../javascript/localhost.js"></script>
    <script src="../javascript/ui-util.js"></script>
    <script src="../javascript/department.js"></script>
    <script src="../javascript/darkmode.js"></script>
    <script src="../javascript/index.js"></script>
</body>

</html>
