<body>

    <div class="noise-bg"></div>

    <div class="split-card">
        
        <div class="login-side" id="auth-container">
            <div id="auth-content">
                <div class="login-header">
                    <h2>Welcome to NCBA.LIFE</h2>
                    <p>Access your student portal</p>
                </div>

                <form class="login-form">
                    <div class="input-group">
                        <label>User ID</label>
                        <input type="text" id="user_id" placeholder="Student number">
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="user_password" placeholder="Min. 8 characters">
                    </div>

                    <div class="form-actions">
                        <!-- <label class="remember-me">
                            <input type="checkbox"> Remember for 30 days
                        </label> -->
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" id="login-button" class="btn-primary">Log in</button>
                    
                </form>

                <div class="register-prompt">
                    <p>Don't have an account? <a href="#" id="toggle-auth">Sign Up</a></p>
                </div>
            </div>
        </div>

        <div class="intro-side">
            <div class="intro-content">
                <h1>Designed by students, <br/> Designed for students.</h1>
                <p>Stay informed with exclusive business school events, critical announcements, and community networking—anywhere you go.</p>
            </div>

            <div class="dashboard-preview">
                <div class="mock-card"></div>
                <div class="mock-card"></div>
                <div class="mock-card"></div>
            </div>
        </div>
    </div>
</body>
