<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCBA.Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css-modular/main.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <!-- <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png"> -->
    <link rel="manifest" href="/site.webmanifest">
</head>

<body>
    <div class="split-card">
        <div class="login-side" id="auth-container">
            <div id="auth-content">
                <div class="login-header">
                    <h2>Welcome to NCBA.LIFE</h2>
                    <p>Access your student portal</p>
                </div>

                <form class="login-form">
                    <div class="input-group">
                        <label>User ID</label>
                        <input type="text" id="user_id" placeholder="Student number">
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="user_password" placeholder="Min. 8 characters">
                    </div>

                    <div class="form-actions">
                        <button id="theme-toggle" class="theme-btn" aria-label="Toggle dark mode">
                            <span class="icon-sun">☀️</span>
                            <span class="icon-moon">🌙</span>
                        </button>
                    </div>

                    <button type="submit" id="login-button" class="btn-primary">Log in</button>

                </form>

                <div class="register-prompt">
                    <p>Don't have an account? <a href="#" id="toggle-auth">Sign Up</a></p>
                </div>
            </div>
        </div>

        <div class="intro-side">
            <div class="intro-content">
                <h1>Designed by students, <br /> Designed for students.</h1>
                <p>Stay informed with exclusive business school events, critical announcements, and community
                    networking—anywhere you go.</p>
            </div>

            <div class="dashboard-preview">
                <div class="mock-card"></div>
                <div class="mock-card"></div>
                <div class="mock-card"></div>

            </div>
        </div>
    </div>
</body>
<!--  -->

</html>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../javascript/localhost.js"></script>
<script src="../javascript/login.js"></script>
<script src="../javascript/darkmode.js"></script>
