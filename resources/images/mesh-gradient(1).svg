<svg xmlns="http://www.w3.org/2000/svg" id="mesh-gradient" 
	    width="1000" height="500" viewBox="0 0 1000 500" >
	        <defs>
	            <filter id="blur" filterUnits="userSpaceOnUse" x="0" y="0" width="1000" height="500">
	                <feGaussianBlur stdDeviation="100" />
	            </filter>
	            <filter id="noise" x="0" y="0" width="100%" height="100%">
				<feTurbulence type="fractalNoise" baseFrequency="1" octaves="3" result="turbulence" stitchTiles="stitch" />
				<feBlend in="SourceGraphic" in2="turbulence" mode="overlay" />
			</filter>
	        </defs>
	        <rect id="background" width="100%" height="100%" fill="#ECECEC" />
	        <g id="swatches" width="1000" height="500" filter="url(#blur)"><rect x="412.5573178920183" y="-59.86932289692902" width="409.009591247516" height="415.52198172350825" fill="#EFC313" /><rect x="662.1732294344104" y="-164.649074318136" width="583.4756501514526" height="376.4830499197294" fill="#43d84c" /><rect x="273.25781374760714" y="-7.683276127893635" width="465.6938963624169" height="517.4582782268278" fill="#8FDF9C" /></g>
	    	<rect x="0" y="0" width="1000" height="500" 
	    	style="mix-blend-mode: luminosity; filter: url(#noise); opacity: 27%"></rect>
    	</svg>